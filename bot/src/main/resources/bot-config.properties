# Bot Configuration Properties
# This file contains bot-specific configuration settings

# Message formatting
bot.message.max.length=4096
bot.message.split.enabled=true

# Logging configuration
bot.logging.timestamp.enabled=true
bot.logging.level=INFO

# Input validation
bot.input.sanitize.enabled=true
bot.input.max.length=1000

# Performance settings
bot.update.timeout.seconds=2
bot.message.retry.attempts=3 