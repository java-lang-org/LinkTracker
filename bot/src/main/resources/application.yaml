app:
  telegram-token: ${TELEGRAM_TOKEN} # env variable
  n-threads: 2
  timeout-in-seconds: 5

spring:
  application:
    name: Bot
  liquibase:
    enabled: false
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false

server:
  port: 8080

springdoc:
  swagger-ui:
    enabled: true
    path: /swagger-ui
