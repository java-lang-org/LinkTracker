app:
  telegram-token: ${TELEGRAM_TOKEN}
  n-threads: 2

  notifications:
    topic: notifications
    dlq: dlq
    group-id: consumer-group

spring:
  application:
    name: Bot

  liquibase:
    enabled: false

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false

  data:
    redis:
      host: redis
      port: 6379

server:
  port: 8080

springdoc:
  swagger-ui:
    enabled: true
    path: /swagger-ui

scrapper:
  url: http://scrapper:8081

  timeouts-in-sec:
    connect: 1
    connection-request: 2
    read: 2

retry:
  back-off-period: 2000 # in ms
  max-attempts: 2
  retryable-statuses:
    - 500
    - 502
    - 503
